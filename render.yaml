services:
  - type: web
    name: youtube-thumbnail-studio
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: APP_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.9
